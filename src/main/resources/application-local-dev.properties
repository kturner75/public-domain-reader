# Production profile (PostgreSQL target)

spring.datasource.url=${PDR_DATABASE_URL:jdbc:postgresql://localhost:5432/classic_chat_reader}
spring.datasource.username=${PDR_DATABASE_USERNAME:}
spring.datasource.password=${PDR_DATABASE_PASSWORD:}
#generation.queue.recovery.enabled=false
spring.datasource.driver-class-name=org.postgresql.Driver
spring.flyway.user=${DB_MIGRATOR_USER:pdr_migrator}
spring.flyway.password=${DB_MIGRATOR_PASSWORD:${PDR_DATABASE_PASSWORD:}}

# Schema is migration-owned in production
spring.jpa.hibernate.ddl-auto=validate
spring.h2.console.enabled=false
security.public.rate-limit.store=database

deployment.mode=local
