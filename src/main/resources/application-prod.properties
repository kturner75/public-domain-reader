# Production profile (PostgreSQL target)

spring.datasource.url=${SPRING_DATASOURCE_URL:${DATABASE_URL:}}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DATABASE_USERNAME:}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DATABASE_PASSWORD:}}
spring.flyway.user=${SPRING_FLYWAY_USER:${DB_MIGRATOR_USER:${SPRING_DATASOURCE_USERNAME:${DATABASE_USERNAME:}}}}
spring.flyway.password=${SPRING_FLYWAY_PASSWORD:${DB_MIGRATOR_PASSWORD:${SPRING_DATASOURCE_PASSWORD:${DATABASE_PASSWORD:}}}}

# Schema is migration-owned in production
spring.jpa.hibernate.ddl-auto=validate
spring.h2.console.enabled=false
security.public.rate-limit.store=database
account.auth.rollout.mode=${ACCOUNT_AUTH_ROLLOUT_MODE:internal}
account.auth.rollout.allowed-emails=${ACCOUNT_AUTH_ROLLOUT_ALLOWED_EMAILS:}
account.auth.google.enabled=${ACCOUNT_AUTH_GOOGLE_ENABLED:false}
account.auth.google.client-id=${ACCOUNT_AUTH_GOOGLE_CLIENT_ID:}
account.auth.google.client-secret=${ACCOUNT_AUTH_GOOGLE_CLIENT_SECRET:}
account.auth.google.redirect-uri=${ACCOUNT_AUTH_GOOGLE_REDIRECT_URI:}

# Public deployment serves curated, pre-generated artifacts only by default.
# Override in app.env if the server is intentionally provisioned for live generation.
tts.cache-only=true
generation.cache-only=true
generation.queue.recovery.enabled=false
